<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EZChords – Singalong Chord Player</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

  <!-- ── Header ── -->
  <header class="site-header">
    <div class="header-inner">
      <span class="logo">🎸 EZChords</span>
      <span class="tagline">Singalong chord player for any YouTube song</span>
    </div>
  </header>

  <main>

    <!-- ── URL Input ── -->
    <section class="input-section" id="inputSection">
      <div class="input-card">
        <h2>Paste a YouTube song link to get the chords</h2>
        <div class="url-row">
          <input
            id="youtubeUrl"
            type="text"
            placeholder="https://www.youtube.com/watch?v=…"
            autocomplete="off"
            spellcheck="false"
          />
          <button id="analyzeBtn">Analyze Chords</button>
        </div>

        <!-- Thumbnail preview (shown once a valid URL is detected) -->
        <div id="thumbPreview" class="thumb-preview hidden">
          <img id="thumbImg" src="" alt="Video thumbnail" />
          <div class="thumb-meta">
            <span class="thumb-label">Ready to analyze</span>
          </div>
        </div>
      </div>

      <!-- Previously analyzed songs -->
      <div id="cachedSection" class="cached-section hidden">
        <h3 class="cached-heading">⚡ Previously analyzed — loads instantly</h3>
        <div id="cachedList" class="cached-list"></div>
      </div>
    </section>

    <!-- ── Loading ── -->
    <section id="loadingSection" class="loading-section hidden">
      <div class="spinner"></div>
      <p id="loadingMessage" class="loading-msg">Starting…</p>
      <div class="progress-outer">
        <div class="progress-inner" id="loadingProgress" style="width:0%"></div>
      </div>
      <p class="loading-sub">Chord analysis usually takes 30–90 seconds</p>
    </section>

    <!-- ── Error ── -->
    <section id="errorSection" class="error-section hidden">
      <div class="error-card">
        <span class="error-icon">⚠️</span>
        <p id="errorMessage">An error occurred.</p>
        <button id="retryBtn">Try Another Song</button>
      </div>
    </section>

    <!-- ── Results ── -->
    <section id="resultsSection" class="results-section hidden">

      <!-- Song info bar -->
      <div class="song-info-bar">
        <span class="song-title" id="songTitle">—</span>
        <div class="song-badges">
          <span class="badge badge-key" id="keyBadge">Key: —</span>
          <span class="badge badge-bpm" id="bpmBadge">BPM: —</span>
        </div>
        <div class="transpose-ctrl">
          <button class="transpose-btn" id="transposeDown" title="Down one semitone">▼</button>
          <span class="transpose-label" id="transposeLabel">Original key</span>
          <button class="transpose-btn" id="transposeUp" title="Up one semitone">▲</button>
        </div>

        <div class="transpose-ctrl">
          <button class="transpose-btn" id="speedDown" title="Slower">▼</button>
          <span class="transpose-label" id="speedLabel">Normal speed</span>
          <button class="transpose-btn" id="speedUp" title="Faster">▲</button>
        </div>
        <button class="new-song-btn" id="newSongBtn">← New Song</button>
      </div>

      <!-- Singalong chord track -->
      <div class="chord-section">
        <!-- Scrolling timeline -->
        <div class="chord-timeline" id="chordTimeline">
          <div class="chord-tl-row" id="tlRow">
            <!-- chord blocks + beat markers injected by JS -->
          </div>
        </div>
        <!-- Chord diagram cards (prev / current / next) -->
        <div class="chord-trio">
          <div class="chord-card chord-card--prev" id="cardPrev">
            <span class="chord-name"></span>
            <span class="chord-diagram"></span>
          </div>
          <div class="chord-card chord-card--active" id="cardActive">
            <span class="chord-name"></span>
            <span class="chord-diagram"></span>
          </div>
          <div class="chord-card chord-card--next" id="cardNext">
            <span class="chord-name"></span>
            <span class="chord-diagram"></span>
          </div>
        </div>
      </div>

      <!-- Lyrics -->
      <div id="lyricsSection" class="lyrics-section hidden">
        <div class="lyric lyric-prev" id="lyricPrev"></div>
        <div class="lyric lyric-active" id="lyricActive">♪</div>
        <div class="lyric lyric-next" id="lyricNext"></div>
      </div>
        </div>
      </div>

      <!-- Audio player -->
      <div id="audioPlayerPanel" class="audio-player-panel">
        <audio id="audioEl" controls preload="auto"></audio>
      </div>

    </section>

  </main>

  <script src="/static/js/app.js"></script>
</body>
</html>
